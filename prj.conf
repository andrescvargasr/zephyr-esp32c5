CONFIG_EARLY_CONSOLE=y

CONFIG_NETWORKING=y
CONFIG_TEST_RANDOM_GENERATOR=y

CONFIG_MAIN_STACK_SIZE=5200
CONFIG_SHELL_STACK_SIZE=5200
CONFIG_NET_TX_STACK_SIZE=2048
CONFIG_NET_RX_STACK_SIZE=2048

CONFIG_NET_PKT_RX_COUNT=10
CONFIG_NET_PKT_TX_COUNT=10
CONFIG_NET_BUF_RX_COUNT=16
CONFIG_NET_BUF_TX_COUNT=16
CONFIG_NET_MAX_CONTEXTS=10
CONFIG_NET_DHCPV4=y

CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n

CONFIG_NET_TCP=y

CONFIG_NET_LOG=y
CONFIG_INIT_STACKS=y

CONFIG_NET_SHELL=y

CONFIG_NET_STATISTICS=y
CONFIG_NET_STATISTICS_PERIODIC_OUTPUT=n

CONFIG_WIFI=y
CONFIG_WIFI_LOG_LEVEL_ERR=y
CONFIG_NET_L2_WIFI_SHELL=y
# printing of scan results puts pressure on queues in new locking
# design in net_mgmt. So, use a higher timeout for a crowded
# environment.
CONFIG_NET_MGMT_EVENT_QUEUE_TIMEOUT=5000
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=16

# Implementing I2C shell
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_I2C_SHELL=y

CONFIG_NET_BUF_POOL_USAGE=y
# CONFIG_ESP32_WIFI_STATIC_RX_MGMT_BUFFER=y
CONFIG_ESP32_WIFI_DYNAMIC_RX_MGMT_BUFFER=y

# From MQTT publisher sample
# Enable the MQTT Lib
CONFIG_MQTT_LIB=y
CONFIG_NET_LOG=y
CONFIG_NET_CONNECTION_MANAGER=y

CONFIG_POSIX_API=y

# CONFIG_NET_CONFIG_SETTINGS=y
# # CONFIG_NET_CONFIG_MY_IPV6_ADDR="2001:db8::1"
# # CONFIG_NET_CONFIG_PEER_IPV6_ADDR="2001:db8::2"

# # CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.168.1.153"
# CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.168.1.146"


# Enable JSON
CONFIG_JSON_LIBRARY=y